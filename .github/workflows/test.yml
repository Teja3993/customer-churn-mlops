name: Python Code Integrity Test

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install scikit-learn pandas joblib xgboost lightgbm catboost textblob
        
    - name: Verify Workspace Structure
      run: ls -R  # This helps us debug by printing all files in the terminal
        
    - name: Smoke Test - Load Artifacts
      run: |
        # Use a relative path check to ensure the file exists before loading
        python -c "import os, joblib; path='models/churn_stacking_model.joblib'; print(f'Checking {path}...'); print('Model Loaded Successfully') if os.path.exists(path) and joblib.load(path) else print('Model File Missing!')"